syntax = "proto3";

package unified_attestation;

// TEE type enumeration, shared by all three parties.
enum TeeType {
  UNSPECIFIED = 0;
  MOCK = 1;
  CCA = 2;
  CCA_HYDRA = 3;
  TDX = 4;
  TDX_HYDRA = 5;
  CSV = 6;
  CSV_HYDRA = 7;
  ITRUSTEE = 8;
  VIRTCCA = 9;
  ITRUSTEE_HYDRA = 10;
  VIRTCCA_HYDRA = 11;
}

// Attestation mode.
enum AttestationMode {
  // Default: RP generates the nonce, attester binds evidence to it.
  BACKGROUND_CHECK = 0;
  // Attester generates the nonce, RP uses the returned nonce for verification.
  PASSPORT = 1;
}

// RP -> attester: fetch evidence + attester's local wasm component.
message GetEvidenceRequest {
  TeeType tee_type = 1;
  bytes nonce = 2;  // required for background-check, optional for passport
  AttestationMode mode = 3;  // defaults to BACKGROUND_CHECK
}

message GetEvidenceResponse {
  // Evidence byte stream; internal format is defined by the wasm component.
  bytes evidence = 1;
  // Wasm verification component held by the attester, forwarded by RP to verifier.
  bytes wasm_component = 2;
  // Nonce generated by the attester in passport mode (empty in background-check).
  bytes generated_nonce = 3;
  // EAR JWT. In passport mode the attester calls the verifier internally and
  // returns the EAR directly; RP skips the separate Verify call.
  string ear = 4;
}

// RP -> verifier: request EAR.
message VerifyRequest {
  TeeType tee_type = 1;
  bytes nonce = 2;
  bytes evidence = 3;
  // Oneof: first submission uses wasm bytes, subsequent requests use the stable ID.
  oneof wasm {
    bytes wasm_component = 4;
    string wasm_component_id = 5;
  }
}

message VerifyResponse {
  // EAR JWT (ES256), verified locally by RP using the verifier's public key.
  string ear = 1;
  // Registered component ID, reusable in subsequent requests via wasm_component_id.
  string wasm_component_id = 2;
}

service AttesterService {
  rpc GetEvidence(GetEvidenceRequest) returns (GetEvidenceResponse);
}

service VerifierService {
  rpc Verify(VerifyRequest) returns (VerifyResponse);
}
